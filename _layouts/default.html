<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  {% seo %}
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; max-width: 52em; margin: 2em auto; padding: 0 1em; line-height: 1.6; color: #222; }
    pre { background: #f6f8fa; padding: 1em; overflow-x: auto; border-radius: 4px; }
    code { font-size: 0.9em; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 0.5em; text-align: left; }
    th { background: #f6f8fa; }
  </style>
</head>
<body>
{{ content }}
</body>
</html>
